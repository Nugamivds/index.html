<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUÑEZ 3D - CONTROL TOTAL</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/n.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/n.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #4f46e5; --accent: #818cf8; --text: #1e293b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { 
            font-family: system-ui, sans-serif; 
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
        }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .nuñez-word { position: absolute; font-weight: 900; opacity: 0.12; animation: moveLeft 20s infinite linear; font-size: 4rem; color: white; }
        @keyframes moveLeft { 0% { transform: translateX(100vw); } 100% { transform: translateX(-160%); } }
        
        .container, .capital-card, .history-card { 
            background: rgba(255, 255, 255, 0.95); padding: 1.2rem; border-radius: 24px; 
            width: 88%; max-width: 380px; backdrop-filter: blur(12px); z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); margin-bottom: 20px;
        }

        /* CAJA TOTAL GLOBAL */
        .global-total-display {
            background: #1e293b; color: #fff; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 2px solid var(--accent);
        }
        .global-total-display label { color: var(--accent); font-size: 0.7rem; display: block; margin-bottom: 5px; }
        .global-total-display span { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; }
        
        /* VISTA PREVIA EN TIEMPO REAL */
        .live-preview { background: #f8fafc; border: 1px dashed var(--accent); border-radius: 12px; padding: 10px; margin-top: 10px; margin-bottom: 10px; }
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.65rem; color: #64748b; }
        .preview-main { text-align: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 5px; }
        .preview-main span { display: block; font-weight: 900; font-size: 1rem; color: var(--primary); }

        h2 { margin: 0; color: var(--primary); font-size: 1.1rem; text-transform: uppercase; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size: 0.55rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input { width: 85%; padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; }
        
        .cap-box { background: #f1f5f9; padding: 8px 4px; border-radius: 12px; border: 1px solid #cbd5e1; text-align: center; }
        .cap-box label { color: var(--warning); font-size: 0.45rem; display: block; margin-bottom: 3px; }
        .cap-box input { width: 90%; border: none; background: transparent; font-size: 0.8rem; font-weight: 900; text-align: center; padding: 0; color: #1e293b; }

        .comparison-bar { display: flex; justify-content: space-around; margin-top: 15px; padding: 10px; background: #f8fafc; border-radius: 15px; border: 1px solid #e2e8f0; }
        .comparison-bar span { display: block; font-size: 0.9rem; font-weight: 900; }

        .net-box { margin-top: 15px; background: #ecfdf5; padding: 10px; border-radius: 15px; border: 2px solid var(--success); text-align: center; }
        
        .quick-section, .detail-section { background: #fff; padding: 12px; border-radius: 18px; margin-bottom: 10px; border: 2px solid transparent; }
        .quick-section { border-color: var(--warning); }
        .detail-section { border-color: var(--accent); }

        .btn-reg { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .btn-reg:active { transform: scale(0.96); }
        .btn-save-manual { background: var(--primary); color: white; border: none; width: 100%; padding: 8px; border-radius: 10px; font-size: 0.7rem; margin-top: 10px; cursor: pointer; font-weight: bold; }
        
        .history-list { max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: white; margin-bottom: 5px; border-radius: 12px; font-size: 0.7rem; }
        .btn-action { border: none; background: #f1f5f9; padding: 6px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="animated-bg" id="bg"></div>

<div class="capital-card">
    <div class="global-total-display">
        <label>💰 TOTAL ABSOLUTO EN CAJA</label>
        <span id="globalTotalDisplay">$0</span>
    </div>
    <div style="text-align: center; font-weight: 900; font-size: 0.8rem; margin-bottom: 10px; color: var(--text);">📊 DESGLOSE DE FONDOS</div>
    <div class="grid-4">
        <div class="cap-box"><label>FILAMENTO</label><input type="number" id="capMat"></div>
        <div class="cap-box"><label>ENERGÍA</label><input type="number" id="capEne"></div>
        <div class="cap-box"><label>MÁQUINA</label><input type="number" id="capMch"></div>
        <div class="cap-box"><label>EXTRAS</label><input type="number" id="capExt"></div>
    </div>
    <div class="comparison-bar">
        <div><label>REINVERSIÓN</label><span id="sumReinv" style="color: var(--warning);">$0</span></div>
        <div style="border-left: 1px solid #e2e8f0;"></div>
        <div><label>GANANCIA NETA</label><span id="sumNet" style="color: var(--success);">$0</span></div>
    </div>
    <div class="net-box">
        <label style="color: var(--success); font-size: 0.7rem;">🏆 GANANCIA PURA ACUMULADA</label>
        <input type="number" id="capNet" style="width: 100%; border: none; background: transparent; font-size: 1.5rem; font-weight: 900; text-align: center; color: var(--success); outline: none;">
    </div>
    <button class="btn-save-manual" onclick="saveManualAdjustment()">💾 GUARDAR AJUSTE MANUAL</button>
</div>

<div class="container">
    <h2>⚡ Venta Rápida (Llaveros)</h2>
    <div class="quick-section">
        <label>Nombre del Registro</label>
        <input type="text" id="qName" value="Llavero" style="width: 93%; margin-bottom: 8px;">
        <div class="grid-2">
            <div><label>Gramos p/u</label><input type="number" id="qGrams" value="10" oninput="updateQuickPreview()"></div>
            <div><label>Cantidad</label><input type="number" id="qQty" value="1" oninput="updateQuickPreview()"></div>
        </div>
        
        <div class="live-preview">
            <div class="preview-main"><label>SUGERIDO P/UNIDAD (X3)</label><span id="qSugerido">$0</span></div>
            <div class="preview-grid">
                <div>Costo Mat p/u: <b id="qCMat">$0</b></div>
                <div>Costo Luz p/u: <b id="qCEne">$0</b></div>
            </div>
        </div>

        <label>Precio Unitario Real ($)</label>
        <input type="number" id="qPriceUnit" placeholder="Ej: 2000" style="width: 93%; font-weight: bold; color: var(--primary);">
        <button class="btn-reg" onclick="registerQuickSale()" style="background: var(--warning);">🚀 REGISTRAR LLAVERO</button>
    </div>
</div>

<div class="container" id="sectionDetail">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2>🎨 Proyecto Personalizado</h2>
        <button onclick="toggleConfig()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">⚙️</button>
    </div>
    <div class="detail-section">
        <label>Nombre del Proyecto</label>
        <input type="text" id="projName" placeholder="Maceta" style="width: 93%; margin-bottom: 8px;">
        <div class="grid-2">
            <div><label>Gramos Totales</label><input type="number" id="usedGrams" oninput="updateDetailPreview()"></div>
            <div><label>Horas Totales</label><input type="number" id="hours" oninput="updateDetailPreview()"></div>
            <div><label>Cantidad</label><input type="number" id="itemQty" value="1" oninput="updateDetailPreview()"></div>
            <div><label>Extras $</label><input type="number" id="extraItems" value="0" oninput="updateDetailPreview()"></div>
        </div>

        <div class="live-preview">
            <div class="preview-main"><label>PRECIO SUGERIDO TOTAL</label><span id="dSugerido">$0</span></div>
            <div class="preview-grid">
                <div>Costo Mat: <b id="dCMat">$0</b></div>
                <div>Costo Luz: <b id="dCEne">$0</b></div>
                <div>Costo Base: <b id="dCBase">$0</b></div>
            </div>
        </div>

        <label>Precio de Venta TOTAL ($)</label>
        <input type="number" id="salePrice" style="width: 93%; font-size: 1.2rem; font-weight: 900;">
        <button class="btn-reg" onclick="registerDetailSale()">🔥 REGISTRAR PROYECTO</button>
    </div>

    <div id="configSection" class="hidden" style="margin-top: 10px; padding: 10px; background: #eee; border-radius: 10px;">
        <div class="grid-2">
            <div><label>Precio Rollo</label><input type="number" id="fPrice" value="15000"></div>
            <div><label>Precio Máq</label><input type="number" id="machinePrice" value="400000"></div>
            <div><label>Vida Útil h</label><input type="number" id="machineLife" value="5000"></div>
            <div><label>kWh $</label><input type="number" id="kwhCost" value="50"></div>
            <div><label>Watts</label><input type="number" id="wattage" value="100"></div>
        </div>
    </div>
</div>

<div class="history-card">
    <div style="text-align: center; font-weight: 900; font-size: 0.8rem;">📜 REGISTROS RECIENTES</div>
    <div id="historyList" class="history-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCx6AkXCmpXArUpaIDd8zZIS3Gav8qRg-o",
        authDomain: "calculadora-3d-54d4e.firebaseapp.com",
        databaseURL: "https://calculadora-3d-54d4e-default-rtdb.firebaseio.com",
        projectId: "calculadora-3d-54d4e",
        storageBucket: "calculadora-3d-54d4e.firebasestorage.app",
        messagingSenderId: "454016280906",
        appId: "1:454016280906:web:431a4edb6a0babfb9a79b3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // CARGAR CONFIG
    db.ref('settings').on('value', snap => {
        const d = snap.val();
        if(d) {
            ['fPrice', 'machinePrice', 'machineLife', 'kwhCost', 'wattage'].forEach(id => {
                if(d[id]) document.getElementById(id).value = d[id];
            });
        }
        updateQuickPreview();
        updateDetailPreview();
    });

    // CARGAR CAPITAL REDONDEADO
    db.ref('capital').on('value', snap => {
        const c = snap.val() || {};
        const m = Math.round(c.mat || 0), e = Math.round(c.ene || 0), mc = Math.round(c.mch || 0), ex = Math.round(c.ext || 0), nt = Math.round(c.net || 0);
        document.getElementById('capMat').value = m;
        document.getElementById('capEne').value = e;
        document.getElementById('capMch').value = mc;
        document.getElementById('capExt').value = ex;
        document.getElementById('capNet').value = nt;
        const totalReinv = m + e + mc + ex;
        document.getElementById('sumReinv').innerText = `$${totalReinv.toLocaleString()}`;
        document.getElementById('sumNet').innerText = `$${nt.toLocaleString()}`;
        document.getElementById('globalTotalDisplay').innerText = `$${(totalReinv + nt).toLocaleString()}`;
    });

    // CARGAR HISTORIAL
    db.ref('history').limitToLast(15).on('value', snap => {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        const data = snap.val();
        if(data) {
            Object.keys(data).reverse().forEach(key => {
                const v = data[key];
                list.innerHTML += `<div class="history-item">
                    <div style="flex:1"><strong>${v.name}</strong><br><small>${v.date}</small></div>
                    <div style="text-align:right; margin-right:10px;"><b>$${Math.round(v.total)}</b><br><small style="color:green">Neto: $${Math.round(v.net)}</small></div>
                    <div class="history-actions">
                        <button class="btn-action" onclick="editRecord('${key}')">✏️</button>
                        <button class="btn-action" onclick="deleteRecord('${key}')">🗑️</button>
                    </div></div>`;
            });
        }
    });

    // FUNCIÓN CENTRAL DE CÁLCULO (REDONDEO TOTAL)
    function runCalculation(grams, hours, qty, extras, salePriceTotal) {
        const v = (id) => parseFloat(document.getElementById(id).value) || 0;
        const costMat = (v('fPrice') / 1000) * grams * qty;
        const costEne = (v('wattage')/1000) * hours * v('kwhCost') * qty;
        const costMch = v('machineLife') > 0 ? (v('machinePrice') / v('machineLife')) * hours * qty : 0;
        const netProfit = salePriceTotal - (costMat + costEne + costMch + extras);

        return { 
            mat: Math.round(costMat), ene: Math.round(costEne), mch: Math.round(costMch), 
            ext: Math.round(extras), net: Math.round(netProfit), total: Math.round(salePriceTotal), 
            raw: {grams, hours, qty} 
        };
    }

    // PREVIEWS
    function updateQuickPreview() {
        const g = parseFloat(document.getElementById('qGrams').value) || 0;
        const calc = runCalculation(g, 0.3, 1, 0, 0); 
        document.getElementById('qCMat').innerText = `$${calc.mat}`;
        document.getElementById('qCEne').innerText = `$${calc.ene}`;
        document.getElementById('qSugerido').innerText = `$${Math.round((calc.mat + calc.ene + calc.mch) * 3)}`;
    }

    function updateDetailPreview() {
        const g = parseFloat(document.getElementById('usedGrams').value) || 0;
        const h = parseFloat(document.getElementById('hours').value) || 0;
        const q = parseFloat(document.getElementById('itemQty').value) || 1;
        const calc = runCalculation(g, h, q, parseFloat(document.getElementById('extraItems').value)||0, 0);
        document.getElementById('dCMat').innerText = `$${calc.mat}`;
        document.getElementById('dCEne').innerText = `$${calc.ene}`;
        const costBase = calc.mat + calc.ene + calc.mch + calc.ext;
        document.getElementById('dCBase').innerText = `$${costBase}`;
        document.getElementById('dSugerido').innerText = `$${Math.round(costBase * 2.5)}`;
    }

    // REGISTROS
    function registerQuickSale() {
        const qty = parseFloat(document.getElementById('qQty').value) || 0;
        const priceUnit = parseFloat(document.getElementById('qPriceUnit').value) || 0;
        const totalSale = priceUnit * qty; // PRECIO POR UNIDAD x CANTIDAD
        const data = runCalculation(parseFloat(document.getElementById('qGrams').value), 0.3, qty, 0, totalSale);
        processSale(document.getElementById('qName').value, data);
        document.getElementById('qPriceUnit').value = '';
    }

    function registerDetailSale() {
        const price = parseFloat(document.getElementById('salePrice').value) || 0;
        const data = runCalculation(parseFloat(document.getElementById('usedGrams').value), parseFloat(document.getElementById('hours').value), parseFloat(document.getElementById('itemQty').value), parseFloat(document.getElementById('extraItems').value), price);
        processSale(document.getElementById('projName').value || "Proyecto", data);
        ['usedGrams', 'hours', 'salePrice'].forEach(id => document.getElementById(id).value = '');
    }

    function processSale(name, data) {
        db.ref('capital').transaction(c => {
            if(!c) c = { mat:0, ene:0, mch:0, ext:0, net:0 };
            c.mat = Math.round((c.mat || 0) + data.mat);
            c.ene = Math.round((c.ene || 0) + data.ene);
            c.mch = Math.round((c.mch || 0) + data.mch);
            c.ext = Math.round((c.ext || 0) + data.ext);
            c.net = Math.round((c.net || 0) + data.net);
            return c;
        });
        db.ref('history').push({
            name, total: data.total, net: data.net,
            mat: data.mat, ene: data.ene, mch: data.mch, ext: data.ext,
            raw: data.raw, date: new Date().toLocaleString()
        });
    }

    function deleteRecord(key) {
        if(!confirm("¿Eliminar? Se restará del capital.")) return;
        db.ref('history/' + key).once('value', snap => {
            const v = snap.val();
            db.ref('capital').transaction(c => {
                if(c) {
                    c.mat -= v.mat; c.ene -= v.ene; c.mch -= v.mch; c.ext -= v.ext; c.net -= v.net;
                }
                return c;
            });
            db.ref('history/' + key).remove();
        });
    }

    function editRecord(key) {
        db.ref('history/' + key).once('value', snap => {
            const v = snap.val();
            document.getElementById('projName').value = v.name;
            document.getElementById('usedGrams').value = v.raw.grams;
            document.getElementById('hours').value = v.raw.hours;
            document.getElementById('itemQty').value = v.raw.qty;
            document.getElementById('salePrice').value = v.total;
            updateDetailPreview();
            window.scrollTo({ top: document.getElementById('sectionDetail').offsetTop - 20, behavior: 'smooth' });
        });
    }

    function saveManualAdjustment() {
        const getV = (id) => Math.round(parseFloat(document.getElementById(id).value) || 0);
        db.ref('capital').set({ mat: getV('capMat'), ene: getV('capEne'), mch: getV('capMch'), ext: getV('capExt'), net: getV('capNet') })
        .then(() => alert("✅ Ajustado."));
    }

    function toggleConfig() { document.getElementById('configSection').classList.toggle('hidden'); }

    for(let i=0; i<6; i++) {
        const n = document.createElement('div');
        n.className = 'nuñez-word'; n.innerText = 'NUÑEZ';
        n.style.top = Math.random() * 90 + 'vh';
        n.style.animationDelay = (Math.random() * -20) + 's';
        document.getElementById('bg').appendChild(n);
    }
</script>
</body>
</html>
