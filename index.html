<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUÑEZ 3D - CONTROL TOTAL</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/n.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/n.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #4f46e5; --accent: #818cf8; --text: #1e293b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { 
            font-family: system-ui, sans-serif; 
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
        }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .nuñez-word { position: absolute; font-weight: 900; opacity: 0.12; animation: moveLeft 20s infinite linear; font-size: 4rem; color: white; }
        @keyframes moveLeft { 0% { transform: translateX(100vw); } 100% { transform: translateX(-160%); } }
        
        .container, .capital-card, .history-card { 
            background: rgba(255, 255, 255, 0.95); padding: 1.2rem; border-radius: 24px; 
            width: 88%; max-width: 380px; backdrop-filter: blur(12px); z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); margin-bottom: 20px;
        }
        
        h2 { margin: 0; color: var(--primary); font-size: 1.1rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size: 0.55rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input { width: 85%; padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; }
        
        .cap-box { background: #f1f5f9; padding: 8px 4px; border-radius: 12px; border: 1px solid #cbd5e1; text-align: center; }
        .cap-box label { color: var(--warning); font-size: 0.45rem; display: block; margin-bottom: 3px; }
        .cap-box input { width: 90%; border: none; background: transparent; font-size: 0.8rem; font-weight: 900; text-align: center; padding: 0; color: #1e293b; }

        .net-box { margin-top: 15px; background: #ecfdf5; padding: 10px; border-radius: 15px; border: 2px solid var(--success); text-align: center; }

        /* Resumen de Comparación */
        .comparison-bar { display: flex; justify-content: space-around; margin-top: 15px; padding: 10px; background: #f8fafc; border-radius: 15px; border: 1px solid #e2e8f0; }
        .comparison-bar div { text-align: center; }
        .comparison-bar span { display: block; font-size: 0.9rem; font-weight: 900; }
        .comparison-bar label { font-size: 0.45rem; color: #94a3b8; }

        .results { background: #0f172a; color: white; padding: 15px; border-radius: 20px; margin-top: 10px; }
        .sub-desglose { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin: 10px 0; font-size: 0.7rem; }
        .sub-desglose div { display: flex; justify-content: space-between; margin-bottom: 3px; }

        .btn-reg { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-save-manual { background: var(--primary); color: white; border: none; width: 100%; padding: 8px; border-radius: 10px; font-size: 0.7rem; margin-top: 10px; cursor: pointer; font-weight: bold; }
        
        /* Estilos del Historial */
        .history-list { max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; background: white; margin-bottom: 5px; border-radius: 12px; font-size: 0.75rem; }
        .history-item strong { color: var(--primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="animated-bg" id="bg"></div>

<div class="capital-card">
    <div style="text-align: center; font-weight: 900; font-size: 0.8rem; margin-bottom: 10px;">📊 DISTRIBUCIÓN DE FONDOS</div>
    
    <div class="grid-4">
        <div class="cap-box"><label>FILAMENTO</label><input type="number" id="capMat"></div>
        <div class="cap-box"><label>ENERGÍA</label><input type="number" id="capEne"></div>
        <div class="cap-box"><label>MÁQUINA</label><input type="number" id="capMch"></div>
        <div class="cap-box"><label>EXTRAS</label><input type="number" id="capExt"></div>
    </div>

    <div class="comparison-bar">
        <div>
            <label>TOTAL REINVERSIÓN</label>
            <span id="sumReinv" style="color: var(--warning);">$0.00</span>
        </div>
        <div style="border-left: 1px solid #e2e8f0;"></div>
        <div>
            <label>GANANCIA NETA</label>
            <span id="sumNet" style="color: var(--success);">$0.00</span>
        </div>
    </div>

    <div class="net-box">
        <label style="color: var(--success); font-size: 0.7rem;">💰 GANANCIA PURA ACUMULADA</label>
        <input type="number" id="capNet" style="width: 100%; border: none; background: transparent; font-size: 1.5rem; font-weight: 900; text-align: center; color: var(--success); outline: none;">
    </div>
    
    <button class="btn-save-manual" onclick="saveManualAdjustment()">💾 GUARDAR AJUSTE MANUAL</button>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2>NUEVA VENTA</h2>
        <button onclick="toggleConfig()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">⚙️</button>
    </div>

    <div style="background: #f8fafc; padding: 12px; border-radius: 18px;">
        <label>Nombre del Proyecto</label>
        <input type="text" id="projName" placeholder="Ej: Maceta Grande" style="width: 93%; margin-bottom: 8px;">
        
        <div class="grid-2">
            <div><label>Gramos</label><input type="number" id="usedGrams" oninput="calculate()"></div>
            <div><label>Horas</label><input type="number" id="hours" oninput="calculate()"></div>
            <div><label>Cantidad</label><input type="number" id="itemQty" value="1" oninput="calculate()"></div>
            <div><label>Extras $</label><input type="number" id="extraItems" oninput="calculate()"></div>
        </div>

        <div style="background: #eff6ff; padding: 10px; border-radius: 12px; border: 2px solid var(--accent); margin-top: 10px;">
            <label style="color: var(--primary)">Precio Venta Unitario ($)</label>
            <input type="number" id="saleUnitPrice" oninput="calculate()" style="width: 93%; font-size: 1.2rem; font-weight: 900;">
        </div>
    </div>

    <div id="configSection" class="hidden" style="margin-top: 10px; padding: 10px; background: #eee; border-radius: 10px;">
        <div class="grid-2">
            <div><label>Precio Rollo</label><input type="number" id="fPrice" oninput="calculate()"></div>
            <div><label>Precio Máq</label><input type="number" id="machinePrice" oninput="calculate()"></div>
            <div><label>Vida Útil h</label><input type="number" id="machineLife" oninput="calculate()"></div>
            <div><label>kWh $</label><input type="number" id="kwhCost" oninput="calculate()"></div>
            <div><label>Watts</label><input type="number" id="wattage" oninput="calculate()"></div>
        </div>
    </div>

    <div class="results">
        <div class="sub-desglose">
            <div><span>Filamento:</span> <span id="detMat">$0.00</span></div>
            <div><span>Luz:</span> <span id="detEne">$0.00</span></div>
            <div><span>Amortización:</span> <span id="detMch">$0.00</span></div>
            <div><span>Extras:</span> <span id="detExt">$0.00</span></div>
        </div>
        <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--success); border-top:1px solid #334155; padding-top:10px;">
            <span>GANANCIA LIMPIA:</span> <span id="resNet" style="font-size: 1.3rem;">$0.00</span>
        </div>
        <button class="btn-reg" onclick="registerSale()">🚀 REGISTRAR VENTA</button>
    </div>
</div>

<div class="history-card">
    <div style="text-align: center; font-weight: 900; font-size: 0.8rem;">📜 REGISTRO DE VENTAS</div>
    <div id="historyList" class="history-list">
        </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCx6AkXCmpXArUpaIDd8zZIS3Gav8qRg-o",
        authDomain: "calculadora-3d-54d4e.firebaseapp.com",
        databaseURL: "https://calculadora-3d-54d4e-default-rtdb.firebaseio.com",
        projectId: "calculadora-3d-54d4e",
        storageBucket: "calculadora-3d-54d4e.firebasestorage.app",
        messagingSenderId: "454016280906",
        appId: "1:454016280906:web:431a4edb6a0babfb9a79b3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const configIds = ['fPrice', 'machinePrice', 'machineLife', 'kwhCost', 'wattage'];

    // Cargar Configuración
    db.ref('settings').on('value', snap => {
        const d = snap.val();
        if(d) configIds.forEach(id => { if(d[id]) document.getElementById(id).value = d[id]; });
    });

    // Cargar Capital y Actualizar el Resumen de Comparación
    db.ref('capital').on('value', snap => {
        const c = snap.val() || {};
        const m = c.mat || 0, e = c.ene || 0, mc = c.mch || 0, ex = c.ext || 0, nt = c.net || 0;
        
        document.getElementById('capMat').value = m.toFixed(2);
        document.getElementById('capEne').value = e.toFixed(2);
        document.getElementById('capMch').value = mc.toFixed(2);
        document.getElementById('capExt').value = ex.toFixed(2);
        document.getElementById('capNet').value = nt.toFixed(2);

        // Cálculo de totales para el resumen
        document.getElementById('sumReinv').innerText = `$${(m + e + mc + ex).toLocaleString()}`;
        document.getElementById('sumNet').innerText = `$${nt.toLocaleString()}`;
    });

    // Escuchar cambios en el Historial de Ventas
    db.ref('history').limitToLast(10).on('value', snap => {
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        const data = snap.val();
        if(data) {
            Object.values(data).reverse().forEach(v => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div><strong>${v.name}</strong><br><small>${v.date}</small></div>
                    <div style="text-align:right">
                        <span style="color:var(--primary); font-weight:bold;">$${v.total}</span><br>
                        <small style="color:var(--success)">Neto: $${v.net}</small>
                    </div>`;
                container.appendChild(div);
            });
        }
    });

    function calculate() {
        const v = (id) => parseFloat(document.getElementById(id).value) || 0;
        const mat = (v('fPrice') / 1000) * v('usedGrams');
        const ene = (v('wattage')/1000) * v('hours') * v('kwhCost');
        const mch = v('machineLife') > 0 ? (v('machinePrice') / v('machineLife')) * v('hours') : 0;
        const ext = v('extraItems');
        const totalCost = mat + ene + mch + ext;
        const totalSale = v('saleUnitPrice') * v('itemQty');
        const netProfit = totalSale - totalCost;

        document.getElementById('detMat').innerText = `$${mat.toFixed(2)}`;
        document.getElementById('detEne').innerText = `$${ene.toFixed(2)}`;
        document.getElementById('detMch').innerText = `$${mch.toFixed(2)}`;
        document.getElementById('detExt').innerText = `$${ext.toFixed(2)}`;
        document.getElementById('resNet').innerText = `$${netProfit.toFixed(2)}`;

        return { mat, ene, mch, ext, net: netProfit, total: totalSale };
    }

    function registerSale() {
        const data = calculate();
        const pName = document.getElementById('projName').value || "Venta";

        // 1. Actualizar Fondos
        db.ref('capital').transaction(c => {
            if(!c) c = { mat:0, ene:0, mch:0, ext:0, net:0 };
            c.mat = (c.mat || 0) + data.mat;
            c.ene = (c.ene || 0) + data.ene;
            c.mch = (c.mch || 0) + data.mch;
            c.ext = (c.ext || 0) + data.ext;
            c.net = (c.net || 0) + data.net;
            return c;
        });

        // 2. Registrar en Historial
        db.ref('history').push({
            name: pName,
            total: data.total.toFixed(2),
            net: data.net.toFixed(2),
            date: new Date().toLocaleString()
        });

        const settings = {};
        configIds.forEach(id => settings[id] = parseFloat(document.getElementById(id).value) || 0);
        db.ref('settings').set(settings);
        
        alert("Venta registrada.");
        document.getElementById('projName').value = '';
    }

    function saveManualAdjustment() {
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        const newCap = {
            mat: getV('capMat'), ene: getV('capEne'), mch: getV('capMch'), ext: getV('capExt'), net: getV('capNet')
        };
        db.ref('capital').set(newCap).then(() => alert("✅ Fondos actualizados."));
    }

    function toggleConfig() { document.getElementById('configSection').classList.toggle('hidden'); }

    for(let i=0; i<6; i++) {
        const n = document.createElement('div');
        n.className = 'nuñez-word'; n.innerText = 'NUÑEZ';
        n.style.top = Math.random() * 90 + 'vh';
        n.style.animationDelay = (Math.random() * -20) + 's';
        document.getElementById('bg').appendChild(n);
    }
</script>
</body>
</html>
