<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUÑEZ 3D - VENTA REAL</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/n.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/n.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #4f46e5; --accent: #818cf8; --text: #1e293b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { 
            font-family: system-ui, sans-serif; 
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #FF3CAC 0%, #784BA0 50%, #2B86C5 100%);
        }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .nuñez-word { position: absolute; font-weight: 900; opacity: 0.12; animation: moveLeft 20s infinite linear; font-size: 4rem; color: white; }
        @keyframes moveLeft { 0% { transform: translateX(100vw); } 100% { transform: translateX(-160%); } }
        
        .container, .capital-card, .history { 
            background: rgba(255, 255, 255, 0.95); padding: 1.2rem; border-radius: 24px; 
            width: 88%; max-width: 380px; backdrop-filter: blur(12px); z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); margin-bottom: 20px;
        }
        
        h2 { margin: 0; color: var(--primary); font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size: 0.6rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input { width: 85%; padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; }
        
        /* Sección de Venta */
        .sale-input-box { background: #eff6ff; padding: 12px; border-radius: 15px; border: 2px solid var(--accent); margin-top: 10px; }
        
        .results { background: #0f172a; color: white; padding: 15px; border-radius: 20px; margin-top: 10px; }
        .desglose-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .cap-input { width: 80%; border: none; background: #f1f5f9; font-size: 1rem; font-weight: 900; text-align: center; padding: 6px; border-radius: 8px; color: inherit; }
        .btn-reg { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .action-btn { font-size: 0.9rem; cursor: pointer; border: none; background: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="animated-bg" id="bg"></div>

<div class="capital-card">
    <div style="text-align: center; font-weight: 900; font-size: 0.75rem; margin-bottom: 8px;">💸 CAPITAL ACUMULADO</div>
    <div class="grid">
        <div style="color: var(--warning); text-align: center;">
            <label style="font-size: 0.5rem;">REINVERSIÓN</label>
            <input type="number" id="capFabInput" class="cap-input">
        </div>
        <div style="color: var(--success); text-align: center;">
            <label style="font-size: 0.5rem;">GANANCIA PURA</label>
            <input type="number" id="capNetInput" class="cap-input">
        </div>
    </div>
    <button onclick="updateCapitalManually()" style="font-size: 0.55rem; width: 100%; margin-top: 8px; color: #94a3b8; border: none; background: none; cursor: pointer;">💾 Guardar Ajuste Manual</button>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 id="formTitle">NUEVA VENTA</h2>
        <button onclick="toggleConfig()" style="font-size:1.2rem;">⚙️</button>
    </div>

    <div style="background: #f8fafc; padding: 12px; border-radius: 18px;">
        <label>Nombre del Proyecto</label>
        <input type="text" id="projName" placeholder="Ej: 10 Llaveros" style="width: 93%; margin-bottom: 8px;">
        
        <div class="grid">
            <div><label>Gramos Totales</label><input type="number" id="usedGrams" oninput="calculate()"></div>
            <div><label>Horas Totales</label><input type="number" id="hours" oninput="calculate()"></div>
            <div><label>Cant. Items</label><input type="number" id="itemQty" value="1" oninput="calculate()"></div>
            <div><label>Costo Extras</label><input type="number" id="extraItems" oninput="calculate()" placeholder="Argollas, etc"></div>
        </div>

        <div class="sale-input-box">
            <label style="color: var(--primary)">Precio Venta Unitario ($)</label>
            <input type="number" id="saleUnitPrice" value="2000" oninput="calculate()" style="width: 93%; font-size: 1.2rem; font-weight: 900; border-color: var(--accent);">
        </div>
    </div>

    <div id="configSection" class="hidden" style="margin-top: 10px; padding: 10px; background: #eee; border-radius: 10px;">
        <div class="grid">
            <div><label>Precio Rollo</label><input type="number" id="fPrice" oninput="calculate()"></div>
            <div><label>Precio Máq</label><input type="number" id="machinePrice" oninput="calculate()"></div>
            <div><label>Vida Útil h</label><input type="number" id="machineLife" oninput="calculate()"></div>
            <div><label>kWh $</label><input type="number" id="kwhCost" oninput="calculate()"></div>
            <div><label>Watts</label><input type="number" id="wattage" oninput="calculate()"></div>
        </div>
    </div>

    <div class="results">
        <div class="desglose-item"><span>Total Cobrado:</span> <span id="resTotalVenta" style="font-weight:900">$0.00</span></div>
        <div class="desglose-item"><span>(-) Costo Fab. Total:</span> <span id="resCostoFab" style="color:var(--warning)">$0.00</span></div>
        
        <div style="font-size: 1.4rem; font-weight: 900; color: var(--success); display: flex; justify-content: space-between; border-top: 1px solid #334155; margin-top: 8px; padding-top: 8px;">
            <span style="font-size:0.8rem; color:#94a3b8">GANANCIA PURA:</span> <span id="resNet">$0.00</span>
        </div>
        <div style="font-size:0.65rem; text-align:right; opacity:0.7; margin-top:5px;">Ganancia por unidad: <span id="resNetUnit">$0.00</span></div>

        <button id="btnMain" class="btn-reg" onclick="handleSaleAction()">🚀 REGISTRAR VENTA</button>
        <button id="btnCancel" class="btn-cancel hidden" onclick="cancelEdit()" style="color:white; background: #64748b; width:100%; padding:8px; border-radius:10px; margin-top:5px; border:none; cursor:pointer;">CANCELAR EDICIÓN</button>
    </div>
</div>

<div class="history">
    <div style="font-weight: bold; border-bottom: 2px solid var(--primary); margin-bottom: 8px; font-size: 0.8rem;">HISTORIAL DE VENTAS</div>
    <div id="salesList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCx6AkXCmpXArUpaIDd8zZIS3Gav8qRg-o",
        authDomain: "calculadora-3d-54d4e.firebaseapp.com",
        databaseURL: "https://calculadora-3d-54d4e-default-rtdb.firebaseio.com",
        projectId: "calculadora-3d-54d4e",
        storageBucket: "calculadora-3d-54d4e.firebasestorage.app",
        messagingSenderId: "454016280906",
        appId: "1:454016280906:web:431a4edb6a0babfb9a79b3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let editingKey = null;
    let oldSaleData = null;
    const ids = ['fPrice', 'usedGrams', 'hours', 'wattage', 'machinePrice', 'machineLife', 'kwhCost', 'extraItems', 'itemQty', 'saleUnitPrice'];

    db.ref('settings').on('value', snap => {
        const d = snap.val();
        if(d) ids.forEach(id => { if(d[id] !== undefined) document.getElementById(id).value = d[id]; });
        calculate();
    });

    db.ref('capital').on('value', snap => {
        const c = snap.val() || { fab: 0, net: 0 };
        document.getElementById('capFabInput').value = c.fab.toFixed(2);
        document.getElementById('capNetInput').value = c.net.toFixed(2);
    });

    db.ref('sales').on('value', snap => {
        const list = document.getElementById('salesList');
        list.innerHTML = "";
        snap.forEach(child => {
            const s = child.val();
            list.innerHTML = `
                <div class="history-item">
                    <div style="font-size: 0.7rem;">
                        <b>${s.name}</b> (${s.qty}u)<br>
                        Neto: <span style="color:var(--success)">$${s.net.toFixed(2)}</span> | Bruto: $${s.total.toFixed(2)}
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="action-btn" onclick="prepareEdit('${child.key}')">✏️</button>
                        <button class="action-btn" onclick="deleteSale('${child.key}')">🗑️</button>
                    </div>
                </div>
            ` + list.innerHTML;
        });
    });

    function calculate() {
        const v = (id) => parseFloat(document.getElementById(id).value) || 0;
        const qty = v('itemQty') || 1;
        
        // 1. COSTO DE FABRICACIÓN (Lo que hay que reinvertir)
        const mat = (v('fPrice') / 1000) * v('usedGrams');
        const mch = (v('machinePrice') / v('machineLife')) * v('hours');
        const ene = (v('wattage')/1000) * v('hours') * v('kwhCost');
        const fabTotal = mat + mch + ene + v('extraItems');
        
        // 2. VENTA REAL
        const totalVenta = v('saleUnitPrice') * qty;
        
        // 3. GANANCIA PURA (Venta - Costo)
        const gananciaNeta = totalVenta - fabTotal;

        document.getElementById('resTotalVenta').innerText = `$${totalVenta.toFixed(2)}`;
        document.getElementById('resCostoFab').innerText = `$${fabTotal.toFixed(2)}`;
        document.getElementById('resNet').innerText = `$${gananciaNeta.toFixed(2)}`;
        document.getElementById('resNetUnit').innerText = `$${(gananciaNeta / qty).toFixed(2)}`;
        
        return { fab: fabTotal, net: gananciaNeta, total: totalVenta, name: document.getElementById('projName').value, qty: qty };
    }

    function handleSaleAction() {
        const data = calculate();
        if(editingKey) {
            db.ref('capital').transaction(c => {
                if(c) {
                    c.fab = c.fab - oldSaleData.fab + data.fab;
                    c.net = c.net - oldSaleData.net + data.net;
                }
                return c;
            });
            db.ref('sales/' + editingKey).update({...data, date: new Date().toLocaleDateString()});
            cancelEdit();
        } else {
            db.ref('sales').push({...data, date: new Date().toLocaleDateString()});
            db.ref('capital').transaction(c => {
                if(!c) c = { fab: 0, net: 0 };
                c.fab += data.fab; c.net += data.net;
                return c;
            });
            // Guardar settings
            const vals = {};
            ids.forEach(id => vals[id] = parseFloat(document.getElementById(id).value) || 0);
            db.ref('settings').set(vals);
            document.getElementById('projName').value = "";
        }
        alert("¡Venta guardada!");
    }

    function prepareEdit(key) {
        db.ref('sales/' + key).once('value', snap => {
            const s = snap.val();
            oldSaleData = s;
            editingKey = key;
            document.getElementById('projName').value = s.name;
            document.getElementById('itemQty').value = s.qty;
            document.getElementById('saleUnitPrice').value = s.total / s.qty;
            
            document.getElementById('btnMain').innerText = "💾 GUARDAR CAMBIOS";
            document.getElementById('btnCancel').classList.remove('hidden');
            document.getElementById('formTitle').innerText = "EDITANDO VENTA";
            window.scrollTo(0,0);
            calculate();
        });
    }

    function deleteSale(key) {
        if(confirm("¿Borrar venta?")) {
            db.ref('sales/' + key).once('value', snap => {
                const s = snap.val();
                db.ref('capital').transaction(c => {
                    if(c) { c.fab -= s.fab; c.net -= s.net; }
                    return c;
                });
                db.ref('sales/' + key).remove();
            });
        }
    }

    function cancelEdit() {
        editingKey = null; oldSaleData = null;
        document.getElementById('projName').value = "";
        document.getElementById('btnMain').innerText = "🚀 REGISTRAR VENTA";
        document.getElementById('btnCancel').classList.add('hidden');
        document.getElementById('formTitle').innerText = "NUEVA VENTA";
    }

    function updateCapitalManually() {
        const fab = parseFloat(document.getElementById('capFabInput').value) || 0;
        const net = parseFloat(document.getElementById('capNetInput').value) || 0;
        db.ref('capital').set({ fab, net }).then(() => alert("Capital ajustado"));
    }

    function toggleConfig() { document.getElementById('configSection').classList.toggle('hidden'); }
    
    // BG
    for(let i=0; i<6; i++) {
        const n = document.createElement('div');
        n.className = 'nuñez-word'; n.innerText = 'NUÑEZ';
        n.style.top = Math.random() * 90 + 'vh';
        n.style.animationDelay = (Math.random() * -20) + 's';
        document.getElementById('bg').appendChild(n);
    }
</script>
</body>
</html>
